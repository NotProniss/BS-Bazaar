<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BS Bazaar</title>
    <script>
      // Suppress script loading errors for external resources in development
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' && e.target.src.includes('/ingest/')) {
          console.warn('PostHog script loading error suppressed (expected in dev):', e);
          e.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
